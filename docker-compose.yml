version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: openbench_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-openbench}
      MYSQL_USER: ${DB_USER:-openbench_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: openbench_web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-openbench}
      - DB_USER=${DB_USER:-openbench_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://192.168.1.2:8080,http://localhost:8080,http://127.0.0.1:8080,http://192.168.1.2}
      - WORKER_USER=${WORKER_USER}
      - WORKER_PASSWORD=${WORKER_PASSWORD}
    volumes:
      # Mounts your local OpenBench clone (assuming it is a sibling of the openbench-homelab directory)
      - ../OpenBench:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/Media

  proxy:
    image: nginx:alpine
    container_name: openbench_proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-80}:80"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/Media:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: openbench_worker
    restart: unless-stopped
    depends_on:
      - proxy
    environment:
      - OPENBENCH_REPO=${OPENBENCH_REPO}
      - OPENBENCH_REF=${OPENBENCH_REF}
      - WORKER_USER=${WORKER_USER}
      - WORKER_PASSWORD=${WORKER_PASSWORD}
      - SERVER_URL=${SERVER_URL:-http://proxy}
      - WORKER_THREADS=${WORKER_THREADS:-3}
    # Mount a volume to keep compiled engine builds/cached books between worker restarts
    volumes:
      - worker_data:/worker

volumes:
  db_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  worker_data:
    driver: local
